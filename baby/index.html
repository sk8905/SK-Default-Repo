<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Little Steps — baby development tracker</title>
<meta name="description" content="A private, offline-first tracker for your baby's development, sleep, feeding, milk, weaning, vaccinations and health checks — grounded in UK, Irish and French guidance." />
<style>
  :root{
    --bg:#f6f8fb; --card:#ffffff; --ink:#1f2733; --muted:#6b7488; --line:#e6e9f0;
    --brand:#3b7a8c; --brand-2:#5aa6b6; --accent:#e98a7a; --accent-2:#f3b8ab;
    --green:#2f9e6f; --amber:#d99311; --red:#d6584c; --soft:#eef5f7;
    --uk:#2557a7; --ie:#1c8a4e; --fr:#5b54c4;
    --radius:16px; --shadow:0 6px 20px rgba(30,50,90,.08);
  }
  *{box-sizing:border-box}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    color:var(--ink); background:var(--bg); line-height:1.5; -webkit-font-smoothing:antialiased;
  }
  a{color:var(--brand)}
  h1,h2,h3{margin:0 0 .4em; line-height:1.25}
  h2{font-size:1.35rem}
  h3{font-size:1.05rem}
  .wrap{max-width:1040px; margin:0 auto; padding:0 1rem 4rem}
  /* Header */
  header.top{
    background:linear-gradient(135deg,var(--brand) 0%,var(--brand-2) 100%);
    color:#fff; padding:1.1rem 1rem .9rem;
  }
  .top-inner{max-width:1040px; margin:0 auto; display:flex; align-items:center; gap:.8rem; flex-wrap:wrap}
  .logo{width:42px;height:42px;border-radius:12px;background:rgba(255,255,255,.18);display:grid;place-items:center;font-size:1.5rem}
  .brandname{font-weight:700;font-size:1.25rem;letter-spacing:.2px}
  .brandsub{font-size:.74rem;text-transform:uppercase;letter-spacing:1.3px;opacity:.85}
  .babychip{margin-left:auto;background:rgba(255,255,255,.16);border-radius:999px;padding:.35rem .8rem;font-size:.85rem;display:flex;gap:.5rem;align-items:center}
  .babychip b{font-weight:600}
  /* Nav */
  nav.tabs{position:sticky;top:0;z-index:20;background:var(--card);border-bottom:1px solid var(--line);box-shadow:0 2px 8px rgba(30,50,90,.04)}
  .tabs-inner{max-width:1040px;margin:0 auto;display:flex;gap:.1rem;overflow-x:auto;padding:0 .4rem}
  .tabs button{
    border:0;background:none;padding:.85rem .8rem;font-size:.9rem;color:var(--muted);cursor:pointer;
    white-space:nowrap;border-bottom:3px solid transparent;font-weight:500;font-family:inherit
  }
  .tabs button:hover{color:var(--ink)}
  .tabs button.active{color:var(--brand);border-bottom-color:var(--brand);font-weight:600}
  /* Cards */
  .card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:1.2rem;margin:1rem 0}
  .card.tight{padding:1rem}
  .grid{display:grid;gap:1rem}
  @media(min-width:680px){.grid.two{grid-template-columns:1fr 1fr}.grid.three{grid-template-columns:1fr 1fr 1fr}}
  .muted{color:var(--muted)}
  .small{font-size:.85rem}
  .tiny{font-size:.78rem}
  /* Buttons + inputs */
  button.btn,a.btn{display:inline-flex;align-items:center;gap:.4rem;border:1px solid var(--brand);background:var(--brand);color:#fff;border-radius:10px;padding:.5rem .9rem;font-size:.9rem;font-weight:600;cursor:pointer;text-decoration:none;font-family:inherit}
  button.btn:hover,a.btn:hover{background:#33697a}
  button.btn.ghost,a.btn.ghost{background:#fff;color:var(--brand)}
  button.btn.ghost:hover{background:var(--soft)}
  button.btn.danger{background:#fff;color:var(--red);border-color:var(--red)}
  button.btn.danger:hover{background:#fdeceb}
  button.btn.small,a.btn.small{padding:.32rem .6rem;font-size:.8rem}
  input,select,textarea{font-family:inherit;font-size:.92rem;padding:.5rem .6rem;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);width:100%}
  input[type=checkbox]{width:auto}
  label.fld{display:block;margin:.5rem 0}
  label.fld .lbl{font-size:.8rem;color:var(--muted);font-weight:600;display:block;margin-bottom:.2rem}
  .row{display:flex;gap:.6rem;flex-wrap:wrap;align-items:flex-end}
  .row > *{flex:1;min-width:120px}
  /* Status pills */
  .pill{display:inline-block;padding:.16rem .55rem;border-radius:999px;font-size:.74rem;font-weight:600}
  .pill.done{background:#e6f5ee;color:var(--green)}
  .pill.due{background:#fdf1dc;color:var(--amber)}
  .pill.over{background:#fce9e7;color:var(--red)}
  .pill.up{background:#eef0f4;color:var(--muted)}
  .pill.uk{background:#e7eefa;color:var(--uk)}
  .pill.ie{background:#e3f5ea;color:var(--ie)}
  .pill.fr{background:#ecebfb;color:var(--fr)}
  /* Schedule rows */
  .sched{display:flex;gap:.8rem;align-items:flex-start;padding:.7rem 0;border-top:1px solid var(--line)}
  .sched:first-child{border-top:0}
  .sched .when{min-width:96px;font-weight:600;font-size:.86rem}
  .sched .body{flex:1}
  .sched .ctl{display:flex;gap:.4rem;align-items:center;flex-wrap:wrap}
  .vlist{margin:.3rem 0 0;padding:0;list-style:none;font-size:.9rem}
  .vlist li{padding:.1rem 0 .1rem 1.1rem;position:relative}
  .vlist li:before{content:"•";position:absolute;left:.2rem;color:var(--brand-2)}
  /* banners */
  .banner{border-radius:12px;padding:.8rem 1rem;font-size:.88rem;display:flex;gap:.6rem;align-items:flex-start}
  .banner.warn{background:#fff7e8;border:1px solid #f3dca0;color:#7a5a12}
  .banner.info{background:var(--soft);border:1px solid #cfe3e8;color:#225863}
  .banner .ic{font-size:1.1rem;line-height:1}
  /* tables */
  table{width:100%;border-collapse:collapse;font-size:.88rem}
  th,td{text-align:left;padding:.5rem .5rem;border-bottom:1px solid var(--line);vertical-align:top}
  th{font-size:.76rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
  /* KPI */
  .kpi{display:flex;flex-direction:column;gap:.15rem}
  .kpi .v{font-size:1.7rem;font-weight:700;color:var(--brand)}
  .kpi .l{font-size:.78rem;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .logitem{display:flex;gap:.6rem;align-items:center;padding:.5rem 0;border-top:1px solid var(--line);font-size:.9rem}
  .logitem:first-child{border-top:0}
  .logitem .x{margin-left:auto}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .seg button{border:0;background:#fff;padding:.4rem .7rem;font-size:.84rem;cursor:pointer;font-family:inherit;color:var(--muted)}
  .seg button.on{background:var(--brand);color:#fff}
  .flag{color:var(--red);font-weight:600}
  details.acc{border:1px solid var(--line);border-radius:12px;margin:.6rem 0;overflow:hidden;background:#fff}
  details.acc>summary{cursor:pointer;padding:.7rem .9rem;font-weight:600;list-style:none}
  details.acc>summary::-webkit-details-marker{display:none}
  details.acc>summary:before{content:"▸ ";color:var(--brand-2)}
  details.acc[open]>summary:before{content:"▾ "}
  details.acc .inner{padding:0 .9rem .8rem}
  .srcs a{display:inline-block;margin:.15rem .5rem .15rem 0;font-size:.82rem}
  .country-tag{font-weight:700;font-size:.72rem;text-transform:uppercase;letter-spacing:.5px}
  .country-tag.uk{color:var(--uk)} .country-tag.ie{color:var(--ie)} .country-tag.fr{color:var(--fr)}
  footer.foot{max-width:1040px;margin:2rem auto 0;padding:1rem;color:var(--muted);font-size:.8rem;text-align:center}
  .hidden{display:none}
  .empty{color:var(--muted);font-style:italic;padding:.6rem 0}
  svg .axis{stroke:var(--line);stroke-width:1}
  svg .grid{stroke:#eef1f6;stroke-width:1}
  svg text{font-size:10px;fill:var(--muted)}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="logo" aria-hidden="true">👣</div>
    <div>
      <div class="brandname">Little Steps</div>
      <div class="brandsub">Baby development tracker</div>
    </div>
    <div class="babychip" id="babychip"></div>
  </div>
</header>

<nav class="tabs">
  <div class="tabs-inner" id="tabs"></div>
</nav>

<main class="wrap" id="view"></main>

<footer class="foot">
  <p><strong>Little Steps</strong> is a private, offline-first tool. All data stays in this browser.
  It is an information aid, <strong>not medical advice</strong>. Always follow your GP, health visitor, PHN or paediatrician.</p>
</footer>

<script>
"use strict";
/* ============================================================
   Little Steps — single-file baby development tracker.
   Zero build, no dependencies, no server. Data in localStorage.
   Guidance grounded in UK (NHS/gov.uk), Irish (HSE) and French
   (ameli/sante.gouv/HAS) sources — see the "Guides & sources" tab.
   ============================================================ */

const KEY = "littlesteps.v1";

/* ---------- State ---------- */
const DEFAULT_STATE = {
  baby: {
    name: "Baby",
    dob: "2025-06-05",        // early June 2025 (editable)
    sex: "",                  // 'male' | 'female' | ''
    term: "term",             // 'term' | 'preterm'
    weeksEarly: 0,
    feeding: "mixed",         // breast | formula | mixed
    vitD: "uk"                // which country's vitamin-D rule to show: uk | ie | fr
  },
  settings: { primary: "uk", show: { uk: true, ie: true, fr: true } },
  done: { vax: {}, checks: {}, milestones: {} },
  allergens: {},              // id -> {date, outcome}
  logs: { feeds: [], sleeps: [], growth: [] },
  meta: { created: Date.now() }
};

function load(){
  try{
    const raw = localStorage.getItem(KEY);
    if(!raw) return structuredClone(DEFAULT_STATE);
    const s = JSON.parse(raw);
    // shallow-merge to tolerate older saves
    return deepMerge(structuredClone(DEFAULT_STATE), s);
  }catch(e){ return structuredClone(DEFAULT_STATE); }
}
function deepMerge(base, over){
  for(const k in over){
    if(over[k] && typeof over[k]==="object" && !Array.isArray(over[k]) && typeof base[k]==="object" && !Array.isArray(base[k])){
      deepMerge(base[k], over[k]);
    } else { base[k] = over[k]; }
  }
  return base;
}
let state = load();
function save(){ localStorage.setItem(KEY, JSON.stringify(state)); renderChip(); }

/* ---------- Date helpers ---------- */
const DAY = 86400000;
function parseDate(s){ const d = new Date(s+"T00:00:00"); return isNaN(d)?null:d; }
function dob(){ return parseDate(state.baby.dob) || new Date(); }
function addDays(d, n){ const x=new Date(d); x.setDate(x.getDate()+n); return x; }
function addWeeks(d, n){ return addDays(d, n*7); }
function addMonths(d, n){ const x=new Date(d); const day=x.getDate(); x.setMonth(x.getMonth()+n); if(x.getDate()<day) x.setDate(0); return x; }
function dueDate(at){
  let d = dob();
  if(at.weeks!=null) d = addWeeks(d, at.weeks);
  if(at.months!=null) d = addMonths(d, at.months);
  if(at.days!=null) d = addDays(d, at.days);
  if(at.years!=null) d = addMonths(d, at.years*12);
  return d;
}
function isoDay(d){ return d.toISOString().slice(0,10); }
function fmtDate(d){ if(typeof d==="string") d=parseDate(d); if(!d) return "—";
  return d.toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}); }
function today(){ const n=new Date(); return new Date(n.getFullYear(),n.getMonth(),n.getDate()); }

function ageParts(from=today()){
  const b = dob();
  let months = (from.getFullYear()-b.getFullYear())*12 + (from.getMonth()-b.getMonth());
  if(from.getDate() < b.getDate()) months--;
  const lastMonthDate = addMonths(b, months);
  const days = Math.round((from - lastMonthDate)/DAY);
  const totalDays = Math.round((from - b)/DAY);
  const weeks = Math.floor(totalDays/7);
  return { months, days, weeks, totalDays };
}
function ageLabel(){
  const a = ageParts();
  if(a.totalDays < 0) return "not born yet";
  if(a.weeks < 13) return `${a.weeks} week${a.weeks===1?"":"s"} old`;
  const m = a.months, d = a.days;
  return `${m} month${m===1?"":"s"}${d?`, ${d} day${d===1?"":"s"}`:""} old`;
}
function ageMonthsFloat(date){ return (date - dob())/(DAY*30.4375); }

/* status of a scheduled item vs today */
function statusFor(due, doneDate){
  if(doneDate) return {k:"done", label:"Done "+fmtDate(doneDate)};
  const t = today();
  const diff = Math.round((due - t)/DAY);
  if(diff < -14) return {k:"over", label:"Overdue"};
  if(diff < 0)   return {k:"over", label:"Due now"};
  if(diff <= 42) return {k:"due", label:diff===0?"Due today":`Due in ${diff} day${diff===1?"":"s"}`};
  return {k:"up", label:"From "+fmtDate(due)};
}

/* ============================================================
   GUIDANCE DATA (sourced — see Guides tab for links)
   ============================================================ */

/* ---- Vaccination schedules ---- */
const VAX = {
  uk: {
    label:"UK (NHS / UKHSA)", cls:"uk",
    note:"Schedule for babies born on/after 1 July 2024 (the routine schedule from Jan 2026), which covers a June 2025 baby. Hib/MenC at 1 year was discontinued for children turning 1 on/after 1 July 2025.",
    items:[
      {id:"uk-8w", at:{weeks:8}, when:"8 weeks", v:["6-in-1 (DTaP/IPV/Hib/HepB) — 1st","MenB — 1st","Rotavirus (oral) — 1st"]},
      {id:"uk-12w", at:{weeks:12}, when:"12 weeks", v:["6-in-1 — 2nd","MenB — 2nd","Rotavirus (oral) — 2nd"]},
      {id:"uk-16w", at:{weeks:16}, when:"16 weeks", v:["6-in-1 — 3rd","Pneumococcal (PCV) — 1st"]},
      {id:"uk-12m", at:{months:12}, when:"12 months", v:["MMR — 1st","MenB — booster (3rd)","Pneumococcal (PCV) — booster"]},
      {id:"uk-18m", at:{months:18}, when:"18 months", v:["6-in-1 — 4th","MMR/MMRV — 2nd"], badge:"new from Jan 2026"},
      {id:"uk-3y4m", at:{months:40}, when:"3 yrs 4 mths", v:["4-in-1 pre-school booster (DTaP/IPV)","MMRV final dose (some cohorts)"]},
      {id:"uk-flu", at:{months:24}, when:"~2–3 yrs+", v:["Children's nasal-spray flu — every winter"], recurring:true}
    ]
  },
  ie: {
    label:"Ireland (HSE / immunisation.ie)", cls:"ie",
    note:"Schedule for babies born on/after 1 October 2024 (covers a June 2025 baby): adds a 4th 6-in-1 at 13 months and chickenpox at 12 months; MenC is given separately. Infant doses are given by your GP.",
    items:[
      {id:"ie-2m", at:{months:2}, when:"2 months", v:["6-in-1","PCV13","MenB","Rotavirus (oral)"]},
      {id:"ie-4m", at:{months:4}, when:"4 months", v:["6-in-1","MenC","Rotavirus (oral)"]},
      {id:"ie-6m", at:{months:6}, when:"6 months", v:["6-in-1","PCV13","MenB"]},
      {id:"ie-12m", at:{months:12}, when:"12 months", v:["MMR","MenB","Chickenpox (varicella)"]},
      {id:"ie-13m", at:{months:13}, when:"13 months", v:["6-in-1 — 4th dose","MenC","PCV13"]},
      {id:"ie-45y", at:{months:52}, when:"4–5 yrs (Junior Infants)", v:["4-in-1 booster","MMR — 2nd (MMRV)"]}
    ]
  },
  fr: {
    label:"France (calendrier vaccinal / ameli)", cls:"fr",
    note:"Calendrier for children born from 1 Jan 2023 (covers a June 2025 baby). Several infant vaccines are legally mandatory in France. MenB and MenACWY became mandatory in 2025.",
    items:[
      {id:"fr-2m", at:{months:2}, when:"2 mois", v:["Hexavalent (DTP-coq-Hib-HepB) — 1","Pneumocoque (PCV) — 1","Rotavirus (oral) — recommended"]},
      {id:"fr-3m", at:{months:3}, when:"3 mois", v:["Méningocoque B — 1"]},
      {id:"fr-4m", at:{months:4}, when:"4 mois", v:["Hexavalent — 2","Pneumocoque — 2"]},
      {id:"fr-5m", at:{months:5}, when:"5 mois", v:["Méningocoque B — 2"]},
      {id:"fr-6m", at:{months:6}, when:"6 mois", v:["Méningocoque ACWY — 1"]},
      {id:"fr-11m", at:{months:11}, when:"11 mois", v:["Hexavalent — booster","Pneumocoque — booster"]},
      {id:"fr-12m", at:{months:12}, when:"12 mois", v:["ROR (MMR) — 1","Méningocoque B — 3","Méningocoque ACWY — 2"]},
      {id:"fr-1618m", at:{months:17}, when:"16–18 mois", v:["ROR (MMR) — 2"]},
      {id:"fr-6y", at:{months:72}, when:"6 ans", v:["DTP-coqueluche — booster"]}
    ]
  }
};

/* ---- Health / development checks ---- */
const CHECKS = {
  uk: {
    label:"UK — Health Visitor reviews (Red Book)", cls:"uk",
    items:[
      {id:"uk-newbirth", at:{days:12}, when:"10–14 days", t:"New birth review", d:"Health visitor home visit; feeding, weight, wellbeing."},
      {id:"uk-6w", at:{weeks:6}, when:"6–8 weeks", t:"6–8 week check (GP)", d:"Baby's physical exam (heart, hips, eyes, testes) + mum's postnatal check."},
      {id:"uk-9m", at:{months:10}, when:"9–12 months", t:"9–12 month review", d:"Development, language, diet, safety. ASQ-3 questionnaire sent beforehand."},
      {id:"uk-2y", at:{months:27}, when:"2–2½ years", t:"2-year review (often 27 mths)", d:"Development check, often with the nursery/childminder. ASQ-3 again."}
    ]
  },
  ie: {
    label:"Ireland — PHN / GP checks (mychild.ie)", cls:"ie",
    items:[
      {id:"ie-nb", at:{days:3}, when:"~72 hours", t:"PHN newborn visit", d:"Public Health Nurse visits at home after hospital discharge."},
      {id:"ie-2w", at:{weeks:2}, when:"2 weeks", t:"Newborn GP check", d:"GP examination."},
      {id:"ie-6w", at:{weeks:6}, when:"6 weeks", t:"6-week baby check (GP)", d:"Baby check + maternal 6-week check."},
      {id:"ie-3m", at:{months:3}, when:"3 months", t:"PHN developmental assessment", d:"Usually at the health centre."},
      {id:"ie-79m", at:{months:8}, when:"7–9 months", t:"PHN developmental check", d:"Physical, social, behaviour; hearing/vision observed."},
      {id:"ie-2y", at:{months:22}, when:"18–24 months", t:"Developmental check", d:"Alongside the 12/13-month vaccines period; age-2 review under GP Visit Card."}
    ]
  },
  fr: {
    label:"France — 20 examens obligatoires (carnet de santé)", cls:"fr",
    items:[
      {id:"fr-8d", at:{days:8}, when:"8th day", t:"Examen + certificat de santé", d:"Compulsory; generates a health certificate sent to the PMI.", cert:true},
      {id:"fr-2w", at:{weeks:2}, when:"2nd week", t:"Examen obligatoire", d:""},
      {id:"fr-1m", at:{months:1}, when:"1 mois", t:"Examen obligatoire", d:""},
      {id:"fr-2m", at:{months:2}, when:"2 mois", t:"Examen obligatoire", d:""},
      {id:"fr-3m", at:{months:3}, when:"3 mois", t:"Examen obligatoire", d:""},
      {id:"fr-4m", at:{months:4}, when:"4 mois", t:"Examen obligatoire", d:""},
      {id:"fr-5m", at:{months:5}, when:"5 mois", t:"Examen obligatoire", d:""},
      {id:"fr-8m", at:{months:8}, when:"8 mois", t:"Examen obligatoire", d:""},
      {id:"fr-9m", at:{months:9}, when:"9th month", t:"Examen + certificat de santé", d:"Compulsory; generates a health certificate.", cert:true},
      {id:"fr-11m", at:{months:11}, when:"11 mois", t:"Examen obligatoire", d:""},
      {id:"fr-12m", at:{months:12}, when:"12 mois", t:"Examen obligatoire", d:""},
      {id:"fr-1618m", at:{months:17}, when:"16–18 mois", t:"Examen obligatoire", d:""},
      {id:"fr-24m", at:{months:24}, when:"24th month", t:"Examen + certificat de santé", d:"Compulsory; generates a health certificate.", cert:true}
    ]
  }
};

/* ---- Developmental milestones (NHS-based, with red flags) ---- */
const MILESTONES = [
  {band:"6–8 weeks", m:6, items:[
    {id:"ms-smile", t:"First social smile"},
    {id:"ms-watch", t:"Watches your face, follows with eyes"},
    {id:"ms-coo", t:"Makes cooing sounds"}
  ], flags:["No response to loud sounds","Not focusing on or following a face"]},
  {band:"3–4 months", m:14, items:[
    {id:"ms-head", t:"Holds head steady when upright"},
    {id:"ms-laugh", t:"Laughs, chuckles"},
    {id:"ms-reach", t:"Reaches for objects"},
    {id:"ms-pushup", t:"Pushes up on arms during tummy time"}
  ], flags:["Cannot hold head steady","Not smiling at people","Not reaching for things"]},
  {band:"6 months", m:26, items:[
    {id:"ms-roll", t:"Rolls over both ways"},
    {id:"ms-sitS", t:"Sits with support"},
    {id:"ms-babble", t:"Babbles (ba-ba, ma-ma sounds)"},
    {id:"ms-mouth", t:"Brings objects to mouth"}
  ], flags:["Very stiff or very floppy","Not turning to sounds","Not bringing things to mouth"]},
  {band:"9 months", m:39, items:[
    {id:"ms-sitU", t:"Sits without support"},
    {id:"ms-name", t:"Responds to own name"},
    {id:"ms-pass", t:"Passes objects hand to hand"},
    {id:"ms-strange", t:"Shows stranger awareness"}
  ], flags:["Not sitting with support","No babbling","Not responding to own name","Loss of skills already gained"]},
  {band:"12 months", m:52, items:[
    {id:"ms-stand", t:"Pulls to stand / cruises furniture"},
    {id:"ms-pincer", t:"Pincer grasp (thumb + finger)"},
    {id:"ms-wave", t:"Waves bye-bye, points"},
    {id:"ms-word", t:"Says 1–2 words with meaning"}
  ], flags:["Not weight-bearing on legs","No gestures (waving/pointing)","No single words","Not crawling/moving"]},
  {band:"18 months", m:78, items:[
    {id:"ms-walk", t:"Walks independently"},
    {id:"ms-words", t:"Several single words"},
    {id:"ms-point", t:"Points to show you things"},
    {id:"ms-spoon", t:"Tries to use a spoon"}
  ], flags:["Not walking","Fewer than ~6 words","Not pointing to show interest"]},
  {band:"2 years", m:104, items:[
    {id:"ms-run", t:"Runs, climbs"},
    {id:"ms-2word", t:"Joins 2 words ('more milk')"},
    {id:"ms-follow", t:"Follows simple instructions"},
    {id:"ms-play", t:"Pretend play begins"}
  ], flags:["No 2-word phrases","Not following simple instructions","Loss of skills"]}
];

/* ---- Allergens to introduce during weaning ---- */

function renderChip(){
  const c = document.getElementById("babychip");
  c.innerHTML = `<b>${esc(state.baby.name||"Baby")}</b><span>· ${ageLabel()}</span>`;

function renderTabs(){
  const el = document.getElementById("tabs");
  el.innerHTML = TABS.map(t=>`<button data-tab="${t.id}" class="${t.id===view?"active":""}">${t.label}</button>`).join("");

function esc(s){ return String(s==null?"":s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }

function render(){
  renderTabs(); renderChip();
  const v = document.getElementById("view");
  v.innerHTML = ({
    home:viewHome, milestones:viewMilestones, feeding:viewFeeding, sleep:viewSleep,
    growth:viewGrowth, vax:viewVax, checks:viewChecks, childcare:viewChildcare,
    guides:viewGuides, data:viewData
  }[view]||viewHome)();
  // attach view-specific handlers
  ({home:bindHome, feeding:bindFeeding, sleep:bindSleep, growth:bindGrowth,
    vax:bindSched, checks:bindSched, milestones:bindMilestones, data:bindData}[view]||(()=>{}))();

const disclaimer = `<div class="banner warn"><span class="ic">ℹ️</span><div><strong>Not medical advice.</strong> Ages and schedules are general guides from public UK, Irish &amp; French sources and can change. Your baby is unique — always confirm with your GP, health visitor, PHN or paediatrician, and your Red Book / carnet de santé.</div></div>`;

/* ---------- TODAY / HOME ---------- */
function upcomingItems(){
  const out = [];
  const cc = state.settings.show;
  const primary = state.settings.primary;
  // vaccines (primary country only, to avoid double counting)
  VAX[primary].items.forEach(it=>{
    if(it.recurring) return;
    const due = dueDate(it.at);
    const st = statusFor(due, state.done.vax[it.id]);
    if(st.k!=="done") out.push({type:"💉 Vaccine", when:it.when, due, st, label:it.v.join(", "), cls:VAX[primary].cls});
  });
  CHECKS[primary].items.forEach(it=>{
    const due = dueDate(it.at);
    const st = statusFor(due, state.done.checks[it.id]);
    if(st.k!=="done") out.push({type:"🩺 Check", when:it.when, due, st, label:it.t, cls:CHECKS[primary].cls});
  });
  out.sort((a,b)=>a.due-b.due);
  return out;
}
function viewHome(){
  const a = ageParts();
  const up = upcomingItems();
  const overdue = up.filter(x=>x.st.k==="over");
  const soon = up.filter(x=>x.st.k==="due");
  const next = up.filter(x=>x.st.k==="up").slice(0,3);
  const feeds = state.logs.feeds.filter(f=> f.t && (Date.now()-new Date(f.t).getTime()) < DAY).length;
  const lastFeed = state.logs.feeds[0];
  const msDone = Object.keys(state.done.milestones).length;
  return `
  ${disclaimer}
  <div class="grid three">
    <div class="card tight"><div class="kpi"><span class="v">${a.totalDays<0?"—":(a.weeks<13?a.weeks+"w":a.months+"m")}</span><span class="l">${a.totalDays<0?"not born":"Age ("+ageLabel()+")"}</span></div></div>
    <div class="card tight"><div class="kpi"><span class="v">${feeds}</span><span class="l">Feeds logged today</span></div></div>
    <div class="card tight"><div class="kpi"><span class="v">${msDone}</span><span class="l">Milestones ticked</span></div></div>
  </div>

  ${overdue.length?`<div class="card"><h3>⚠️ Overdue / due now</h3>${overdue.map(rowUp).join("")}</div>`:""}

  <div class="card">
    <h3>Coming up <span class="muted small">· based on ${VAX[state.settings.primary].cls.toUpperCase()} schedule</span></h3>
    ${soon.length?soon.map(rowUp).join(""):`<div class="empty">Nothing due in the next 6 weeks.</div>`}
    ${next.length?`<h4 class="muted small" style="margin:.8rem 0 .2rem">Later</h4>${next.map(rowUp).join("")}`:""}
  </div>

  <div class="card">
    <h3>Quick log</h3>
    <div class="row">
      <button class="btn ghost" data-quick="feed">🍼 Log a feed</button>
      <button class="btn ghost" data-quick="sleep">😴 Log sleep</button>
      <button class="btn ghost" data-quick="growth">📈 Log weight</button>
    </div>
    ${lastFeed?`<p class="small muted" style="margin-top:.7rem">Last feed: ${esc(feedSummary(lastFeed))} · ${timeAgo(lastFeed.t)}</p>`:""}
  </div>

  <div class="card">
    <h3>This month for your family</h3>
    ${monthTips(a.months)}
  </div>`;
}
function rowUp(x){
  return `<div class="logitem">
    <span class="pill ${x.st.k}">${x.st.label}</span>
    <div><strong>${x.type}</strong> · ${esc(x.label)}<br><span class="small muted">${x.when} · ${fmtDate(x.due)}</span></div>
  </div>`;
}
function bindHome(){
  document.querySelectorAll("[data-quick]").forEach(b=>b.onclick=()=>{
    view = ({feed:"feeding",sleep:"sleep",growth:"growth"})[b.dataset.quick]; render();
  });
}
function monthTips(m){
  const tips = [];
  if(m<1) tips.push("Vitamin D from birth (see Feeding tab for your country's dose), back-to-sleep every time, and your first health checks are due.");
  if(m>=1&&m<2) tips.push("First vaccines are coming at 8 weeks (UK) / 2 months (IE/FR). Lots of feeding and short sleep cycles is normal.");
  if(m>=2&&m<4) tips.push("Watch for the first social smile and cooing. Tummy time builds head control.");
  if(m>=4&&m<6) tips.push("Signs of weaning readiness appear — sitting with support, head control, hand-eye-mouth coordination. Don't start solids before 17 weeks.");
  if(m>=5&&m<7) tips.push("Around 6 months: start solids and introduce the common allergens one at a time (see Feeding → Allergens). Keep milk as the main drink.");
  if(m>=7&&m<10) tips.push("Three meals a day build up alongside milk. Cups instead of bottles encouraged. 7–9 month development check (IE) / on track for the 9–12 month review (UK).");
  if(m>=10&&m<12) tips.push("Down to ~3 milk feeds. Finger foods and self-feeding. UK funded childcare for working parents can start the term after 9 months — check eligibility.");
  if(m>=12&&m<15) tips.push("Whole cows' milk can be the main drink now (min ~350 ml/day or 2 dairy servings). 12-month vaccines and MMR. First words may appear.");
  if(m>=15&&m<19) tips.push("18-month UK vaccines (4th 6-in-1 + 2nd MMR). Walking and several words are common.");
  if(m>=19) tips.push("Approaching the 2-year review. Two-word phrases, running and pretend play emerge.");
  if(!tips.length) tips.push("Keep logging feeds, sleep and growth — patterns over time matter more than any single day.");
  return `<ul class="vlist">${tips.map(t=>`<li>${t}</li>`).join("")}</ul>`;
}

/* ---------- MILESTONES ---------- */
function viewMilestones(){
  const aM = ageParts().totalDays/30.4375;
  return `${disclaimer}
  <div class="card"><h2>Development milestones</h2>
  <p class="small muted">Tick what you've seen. Ranges are wide and normal — these are typical, not deadlines. The <span class="flag">red-flag</span> notes are when it's worth a chat with your health visitor / GP / PHN. Loss of any skill already gained always warrants advice.</p></div>
  ${MILESTONES.map(band=>{
    const near = Math.abs(aM*4.345 - band.m) < 26;  // highlight current-ish band
    return `<details class="acc" ${near?"open":""}>
      <summary>${band.band} ${bandProgress(band)}</summary>
      <div class="inner">
        ${band.items.map(it=>`<label class="logitem" style="cursor:pointer">
          <input type="checkbox" data-ms="${it.id}" ${state.done.milestones[it.id]?"checked":""}/>
          <span>${esc(it.t)}</span>
        </label>`).join("")}
        <div class="banner info" style="margin-top:.7rem"><span class="ic">🚩</span><div><strong>Talk to a professional if:</strong> ${band.flags.map(esc).join("; ")}.</div></div>
      </div>
    </details>`;
  }).join("")}`;
}
function bandProgress(band){
  const n = band.items.filter(i=>state.done.milestones[i.id]).length;
  return `<span class="pill ${n===band.items.length?"done":"up"}" style="float:right">${n}/${band.items.length}</span>`;
}
function bindMilestones(){
  document.querySelectorAll("[data-ms]").forEach(cb=>cb.onchange=()=>{
    const id=cb.dataset.ms;
    if(cb.checked) state.done.milestones[id]=isoDay(today()); else delete state.done.milestones[id];
    save(); // don't re-render (keeps accordions open)
    const sum=cb.closest("details").querySelector("summary");
    const band=MILESTONES.find(b=>b.items.some(i=>i.id===id));
    sum.querySelector(".pill").outerHTML = bandProgress(band).match(/<span.*span>/)[0];
  });
}

function vitDText(){
  const f = state.baby.feeding;
  const which = state.baby.vitD;
  if(which==="fr") return `<strong>France:</strong> a prescribed vitamin-D medicine (e.g. ZYMAD/ADRIGYL) from birth, typically <strong>400–1000 IU/day</strong> (often ~800 IU; higher for breastfed/preterm/darker skin). France doses higher than UK/IE — don't double up if also following UK advice.`;
  if(which==="ie") return `<strong>Ireland (HSE):</strong> <strong>5 µg (200 IU) vitamin D3 daily from birth to 12 months</strong> for all babies, <em>unless</em> taking more than 300 ml of formula a day (formula is fortified).`;
  return `<strong>UK (NHS):</strong> breastfed babies <strong>8.5–10 µg (340–400 IU) daily from birth</strong>. Formula-fed: not needed if taking ≥500 ml/day; if less, give 8.5–10 µg. From age 1: 10 µg/day.`;
}

function feedRow(f){
  return `<div class="logitem">
    <span class="pill up">${esc(f.type)}</span>
    <div>${esc(feedSummary(f))}<br><span class="tiny muted">${fmtDateTime(f.t)} · ${timeAgo(f.t)}</span></div>
    <button class="btn ghost small x" data-delfeed="${f.id}">✕</button>
  </div>`;
}
function feedSummary(f){
  if(f.type==="Bottle") return `Bottle ${f.amt?f.amt+" ml":""}${f.note?" · "+f.note:""}`;
  if(f.type==="Breast") return `Breast ${f.side||""}${f.note?" · "+f.note:""}`;
  return `Solids ${f.note?"· "+f.note:""}`;
}
function bindFeeding(){
  const now=new Date(); now.setMinutes(now.getMinutes()-now.getTimezoneOffset());
  const w=document.getElementById("f-when"); if(w) w.value=now.toISOString().slice(0,16);
  let ftype="Breast";
  // default to Bottle if formula-leaning
  if(state.baby.feeding==="formula") ftype="Bottle";
  document.querySelectorAll("#feedtype [data-ft]").forEach(b=>{
    if(b.dataset.ft===ftype) b.classList.add("on"); else b.classList.remove("on");
    b.onclick=()=>{ ftype=b.dataset.ft;
      document.querySelectorAll("#feedtype [data-ft]").forEach(x=>x.classList.toggle("on",x===b));
      document.getElementById("f-amtwrap").style.display = ftype==="Bottle"?"block":"none";
      document.getElementById("f-sidewrap").style.display = ftype==="Breast"?"block":"none";
    };
  });
  document.getElementById("f-amtwrap").style.display = ftype==="Bottle"?"block":"none";
  document.getElementById("f-sidewrap").style.display = ftype==="Breast"?"block":"none";
  document.getElementById("f-add").onclick=()=>{
    const t=document.getElementById("f-when").value||new Date().toISOString();
    const feed={id:uid(),type:ftype,t,amt:+document.getElementById("f-amt").value||null,
      side:document.getElementById("f-side").value||"",note:document.getElementById("f-note").value||""};
    state.logs.feeds.unshift(feed); state.logs.feeds.sort((a,b)=>new Date(b.t)-new Date(a.t));
    save(); render();
  };
  document.querySelectorAll("[data-delfeed]").forEach(b=>b.onclick=()=>{
    state.logs.feeds=state.logs.feeds.filter(f=>f.id!==b.dataset.delfeed); save(); render();
  });
  document.querySelectorAll("[data-aldate]").forEach(i=>i.onchange=()=>{
    const id=i.dataset.aldate; state.allergens[id]=state.allergens[id]||{}; state.allergens[id].date=i.value; save();
  });
  document.querySelectorAll("[data-alout]").forEach(s=>s.onchange=()=>{
    const id=s.dataset.alout; state.allergens[id]=state.allergens[id]||{}; state.allergens[id].outcome=s.value; save();
  });
  document.querySelectorAll("#vitdseg [data-vd]").forEach(b=>b.onclick=()=>{ state.baby.vitD=b.dataset.vd; save(); render(); });
}

  const mins = today24.reduce((a,s)=>a+(s.mins||0),0);
  return `${disclaimer}
  <div class="grid two">
    <div class="card"><h2>Log sleep</h2>
      <div class="row">
        <label class="fld"><span class="lbl">Start</span><input type="datetime-local" id="s-start"/></label>
        <label class="fld"><span class="lbl">End</span><input type="datetime-local" id="s-end"/></label>
      </div>
      <label class="fld"><span class="lbl">Notes</span><input type="text" id="s-note" placeholder="nap / night / settled well"/></label>
      <button class="btn" id="s-add">Add sleep</button>
      <p class="small muted" style="margin-top:.6rem">Logged in last 24h: <strong>${(mins/60).toFixed(1)} h</strong> across ${today24.length} sleeps.</p>
    </div>
    <div class="card"><h3>What's typical (NHS)</h3>
      <table><thead><tr><th>Age</th><th>Total / 24h</th><th>Naps</th></tr></thead><tbody>
        ${SLEEP_NORMS.map(n=>`<tr><td>${n.age}</td><td>${n.total}</td><td class="small">${n.naps}</td></tr>`).join("")}
      </tbody></table>
      <p class="tiny muted">Wide variation is normal — these are averages, not targets.</p>
    </div>
  </div>
  <div class="card"><h3>Recent sleeps</h3>
    ${recent.length?recent.map(sleepRow).join(""):`<div class="empty">No sleeps logged yet.</div>`}
  </div>
  <div class="card"><h3>🛏️ Safe sleep — reducing SIDS / MIN risk</h3>
    <p class="tiny muted">Consistent across UK (Lullaby Trust/NHS), Irish (HSE) and French (ameli) guidance.</p>
    <ul class="vlist">
      <li><strong>Back to sleep</strong>, every sleep, day and night.</li>
      <li><strong>Own clear, firm, flat</strong> sleep space (cot/Moses basket) — no pillows, duvets, bumpers or soft toys. A baby sleeping bag beats loose covers.</li>
      <li><strong>Room-share</strong> (baby in your room, own cot) for at least the first 6 months. "Feet to foot" of the cot.</li>
      <li><strong>Room 16–20°C</strong>; don't let baby overheat.</li>
      <li><strong>Smoke-free</strong> always. Never sleep with baby on a sofa or armchair.</li>
      <li>Breastfeeding lowers risk; if bed-sharing, follow safer co-sleeping advice (never if smoking, recent alcohol/drugs, or prematurity/low birth weight).</li>
    </ul>
  </div>`;
}
function sleepRow(s){
  return `<div class="logitem"><span class="pill up">${(s.mins/60).toFixed(1)}h</span>
    <div>${fmtDateTime(s.start)} → ${s.end?new Date(s.end).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):"?"}${s.note?" · "+esc(s.note):""}</div>

    ${g.length?`<table><thead><tr><th>Date</th><th>Age</th><th>Weight</th><th>Length</th><th>Head</th><th></th></tr></thead><tbody>
      ${g.slice().reverse().map(m=>`<tr><td>${fmtDate(m.date)}</td><td class="small">${growthAge(m.date)}</td><td>${m.w?m.w+" kg":"—"}</td><td>${m.l?m.l+" cm":"—"}</td><td>${m.h?m.h+" cm":"—"}</td><td><button class="btn ghost small" data-delg="${m.id}">✕</button></td></tr>`).join("")}
    </tbody></table>`:`<div class="empty">No measurements yet.</div>`}
  </div>
  <div class="banner info"><span class="ic">📖</span><div>England records growth in the <strong>UK-WHO charts</strong> in your Red Book; Ireland in the PHN records; France in the <strong>carnet de santé</strong>. Newborns can lose up to ~10% of birth weight in the first days and usually regain it by ~2 weeks — more than 10% loss warrants a feeding review.</div></div>`;

function growthAge(date){
  const d=parseDate(date); if(!d) return "";
  const months=(d-dob())/(DAY*30.4375);
  if(months<0) return "—";
  if(months<3) return Math.round((d-dob())/DAY/7)+"w";
  return months.toFixed(1)+"m";
}
function growthChart(g){
  const W=620,H=300,pad=36;
  const maxM=24, maxW=15;
  const x=m=>pad+(m/maxM)*(W-pad*2);
  const y=w=>H-pad-(w/maxW)*(H-pad*2);
  const ref=WHO50[state.baby.sex||"male"];
  const refPts=ref.map((w,m)=>`${x(m)},${y(w)}`).join(" ");
  const pts=g.filter(m=>m.w).map(m=>({mx:ageMonthsFloat(parseDate(m.date)),w:m.w})).filter(p=>p.mx>=0&&p.mx<=maxM);
  const babyPts=pts.map(p=>`${x(p.mx)},${y(p.w)}`).join(" ");
  let grid="";
  for(let w=0;w<=maxW;w+=3){ grid+=`<line class="grid" x1="${pad}" y1="${y(w)}" x2="${W-pad}" y2="${y(w)}"/><text x="4" y="${y(w)+3}">${w}kg</text>`; }
  for(let m=0;m<=maxM;m+=3){ grid+=`<line class="grid" x1="${x(m)}" y1="${pad}" x2="${x(m)}" y2="${H-pad}"/><text x="${x(m)-6}" y="${H-pad+14}">${m}m</text>`; }
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" role="img" aria-label="Weight chart">
    ${grid}
    <polyline fill="none" stroke="#b9c2d0" stroke-width="2" stroke-dasharray="5 4" points="${refPts}"/>
    ${babyPts?`<polyline fill="none" stroke="var(--accent)" stroke-width="2.5" points="${babyPts}"/>`:""}
    ${pts.map(p=>`<circle cx="${x(p.mx)}" cy="${y(p.w)}" r="4" fill="var(--accent)"/>`).join("")}
  </svg>`;
}
function bindGrowth(){
  const a=document.getElementById("g-add");
  if(a) a.onclick=()=>{
    const w=+document.getElementById("g-w").value||null, l=+document.getElementById("g-l").value||null, h=+document.getElementById("g-h").value||null;
    if(!w&&!l&&!h){ alert("Enter at least one measurement"); return; }

}

/* ---------- NURSERY & SCHOOL ---------- */
function ukSchoolStart(){
  // Reception starts the September after the 4th birthday (1 Sep–31 Aug cohort)
  const b=dob(); const fourth=addMonths(b,48);
  let yr=fourth.getFullYear(); if(fourth.getMonth()>8 || (fourth.getMonth()===8 && fourth.getDate()>1)) yr++;
  // if 4th birthday is on/after 1 Sep, Reception is the following year's September
  // Cohort cutoff: child must be 4 by 31 Aug to start that Sept.
  const start = (b.getMonth()<=7)? // born Jan-Aug -> Reception in Sept of year they turn 4 ... compute precisely below
    null:null;
  // precise: academic year runs 1 Sep – 31 Aug. Reception September = first Sep where child is >=4 by 31 Aug.
  let sepYear=b.getFullYear()+4;
  // child turns 4 in (b.month). If born Sep-Dec, they are not 4 by 31 Aug of (birthYear+4), so +1.
  if(b.getMonth()>=8) sepYear=b.getFullYear()+5;
  return sepYear;
}
function isSummerBorn(){ const m=dob().getMonth(); return m>=3 && m<=7; } // Apr–Aug

  </div>

  <div class="card">
    <h3><span class="country-tag uk">UK</span> Starting school (England)</h3>

      <li>Reception starts the <strong>September after the 4th birthday</strong> (1 Sep–31 Aug cohort). For ${esc(state.baby.name||"your baby")} (born ${fmtDate(b)}): <strong>Reception ≈ September ${sep}</strong> (apply the preceding autumn, by ~15 Jan ${sep}).</li>

function nextTermStart(d){
  // English funded-hours terms begin 1 Sep, 1 Jan, 1 Apr
  const y=d.getFullYear();
  const cands=[new Date(y,0,1),new Date(y,3,1),new Date(y,8,1),new Date(y+1,0,1)];
  return cands.find(c=>c>=d) || cands[cands.length-1];
}

  };
  document.getElementById("s-primary").onchange=e=>{ state.settings.primary=e.target.value; state.baby.vitD=e.target.value; save(); render(); };
  document.querySelectorAll("[data-show]").forEach(c=>c.onchange=()=>{ state.settings.show[c.dataset.show]=c.checked; save(); });
  document.getElementById("d-export").onclick=()=>{
    const blob=new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const url=URL.createObjectURL(blob); const a=document.createElement("a");
    a.href=url; a.download=`little-steps-${state.baby.name||"baby"}-${isoDay(today())}.json`; a.click(); URL.revokeObjectURL(url);
  };
  document.getElementById("d-import").onclick=()=>document.getElementById("d-file").click();
  document.getElementById("d-file").onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const r=new FileReader(); r.onload=()=>{ try{
      const incoming=JSON.parse(r.result);
      if(!incoming.baby) throw new Error("Not a Little Steps backup");
      if(confirm("Replace all current data with this backup?")){ state=deepMerge(structuredClone(DEFAULT_STATE),incoming); save(); render(); }
    }catch(err){ alert("Could not import: "+err.message); } };
    r.readAsText(f);
  };
  document.getElementById("d-reset").onclick=()=>{
    if(confirm("Delete ALL data and start fresh? This cannot be undone (export a backup first).")){
      localStorage.removeItem(KEY); state=load(); view="home"; render();
    }
  };
}

/* ---------- misc helpers ---------- */
function uid(){ return Math.random().toString(36).slice(2,9); }
function fmtDateTime(t){ if(!t) return "—"; const d=new Date(t); return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"})+" "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}); }
function timeAgo(t){ if(!t) return ""; const diff=Date.now()-new Date(t).getTime(); const h=Math.floor(diff/3600000); if(h<1) return Math.max(0,Math.floor(diff/60000))+" min ago"; if(h<24) return h+"h ago"; return Math.floor(h/24)+"d ago"; }

/* ---------- boot ---------- */
render();
</script>
